version: '3.8'

services:

  app:
    build: .
    container_name: referral-app
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=change-me-in-production
      - DATABASE_URL=postgresql://referral:referral@db:5432/referraldb
      - BASE_URL=http://localhost:5000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - referral-net

  db:
    image: postgres:15-alpine
    container_name: referral-db
    environment:
      POSTGRES_DB:       referraldb
      POSTGRES_USER:     referral
      POSTGRES_PASSWORD: referral
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U referral"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - referral-net

networks:
  referral-net:
    driver: bridge

volumes:
  pgdata:
