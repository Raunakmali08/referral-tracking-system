version: '3.8'

services:

  app:
    build: .
    container_name: referral-app
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=postgresql://referral:referral@db:5432/referraldb
      - BASE_URL=${BASE_URL:-http://localhost:5000}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - referral-net
    labels:
      - "prometheus.scrape=true"

  db:
    image: postgres:15-alpine
    container_name: referral-db
    environment:
      POSTGRES_DB:       referraldb
      POSTGRES_USER:     referral
      POSTGRES_PASSWORD: referral
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U referral"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - referral-net

  prometheus:
    image: prom/prometheus:latest
    container_name: referral-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - referral-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: referral-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - referral-net
    restart: unless-stopped

networks:
  referral-net:
    driver: bridge

volumes:
  pgdata:
  grafanadata:
